<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kima -- Offline</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    img {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    p { color: rgba(255,255,255,0.4); font-size: 14px; margin: 6px 0; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.2); }
    button {
      margin-top: 20px;
      padding: 8px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.14); }
  </style>
</head>
<body>
  <div>
    <img src="/assets/images/kima.webp" alt="Kima">
    <p>You're offline</p>
    <p class="sub">Check your connection and try again</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
